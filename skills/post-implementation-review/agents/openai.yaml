interface:
  display_name: "Post-Implementation Review"
  short_description: "Manual post-implementation design review for already-implemented code."
  default_prompt: "Use $post-implementation-review only when the user explicitly asks for this review or explicitly asks whether implemented code revealed design flaws, abstraction issues, structural complexity, organization problems, or worthwhile refactors after the code exists. Do not use it for ordinary implementation, debugging, explanation, or generic code review requests. In Pi, if the post-review-loop extension is active or explicitly requested, follow that extension's phase/tool workflow instead of running this manual skill as a parallel loop. When no specific target is provided, default to reviewing uncommitted changes using git status, git diff, git diff --staged, and untracked files shown by status; use the user's provided scope, branch, commit range, or file list instead when present. Treat each finding as a signal about code shape and quality, then look for the root-cause design implication before suggesting action. In normal review-and-improve mode, automatically apply safe in-scope Bucket I fixes, validate them, and report what changed; in review-only mode, do not edit and explicitly say which Bucket I work was left unapplied because of that scope. Prioritize ownership shifts, boundary fixes, API reshapes, data-model adjustments, module splits, simplification, or reorganization when those improve the codebase, even if the refactor touches many files. Batch closely related Bucket I findings that share files, modules, ownership boundaries, or UI state domains when they can be safely verified and fixed together. For UI/state issues, check related labels, disabled states, readiness, permissions, bridge/settings availability, repair actions, and run/resume/complete actions together. Do not optimize for the smallest diff or turn findings into bandage fixes such as tiny helper extractions, one-off log polish, isolated readability nits, or wrapper patches unless they clearly repair a broader boundary, invariant, or ownership problem. Review structure in both directions: over-structure (speculative abstractions, unused fields, premature genericity, wrappers or config surfaces the current behavior does not need) and under-structure (flat directories, mixed responsibilities, scattered ownership). If reusing earlier inspection or validation evidence, first verify the relevant files or command inputs are unchanged; otherwise re-inspect or rerun focused validation. Classify findings into Bucket I — Straightforward / Recommended, Bucket II — Design Choice / Tradeoff, and Keep As-Is. Keep reviewed/inspected files distinct from files edited by the skill in the report. If using independent reviewers or subagents, choose the lightest review shape that materially improves confidence: often none, sometimes one, and multiple only for distinct risk angles. When citing existing code, prefer short embedded snippets with the source file path on the first line as a comment instead of editor-oriented file and line references."
policy:
  allow_implicit_invocation: false
