interface:
  display_name: "Interview"
  short_description: "Interview the user to recover omitted intent and clarify ambiguity"
  default_prompt: "Use $interview only when the user explicitly asks to be interviewed or asks for clarifying questions about their request. Ask small rounds of load-bearing intent questions, follow surprising answers, and keep going until confident. Confirm a compact readback of the understood intent, then proceed with the task. Do not front-load technical decisions."
policy:
  allow_implicit_invocation: false
