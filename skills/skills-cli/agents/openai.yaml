interface:
  display_name: "Skills CLI"
  short_description: "Manage agent skills via skills.sh CLI"
  default_prompt: "Use this skill to install, list, update, remove, and troubleshoot skills with bunx skills for Codex, Claude Code, and Pi. For this repo, treat skills/ as a catalog and install selected skills by name from the GitHub skills subpath; use --copy -g -a claude-code -a pi or --copy -g -a codex only for the intended target."
