interface:
  display_name: "Change Explainer"
  short_description: "Explain a diff, commit, PR, or file pair as a self-contained interactive HTML doc for reviewers"
  default_prompt: "Use change-explainer when the user wants to understand a diff, unstaged or staged changes, a commit, a commit range, a PR patch, or two file versions as a reviewer- or maintainer-oriented walkthrough, delivered as a visual-first, skimmable, self-contained interactive HTML doc rather than a raw recap. If no comparison target is provided, default to the current repo's uncommitted changes: inspect git status, staged and unstaged diffs, and relevant untracked files before asking for clarification. Group scattered hunks into a few conceptual changes named by their technical decision, ordered for learning. Build the doc from the bundled assets/template.html: keep its inline CSS/JS, fill the marked regions, and produce Big Picture (with a standard SVG overview diagram), How the Change Works (collapsed conceptual changes, each with an always-visible skim sentence and a body that leads with its strongest visual when the idea needs one), Key Decisions, Reviewer & Maintenance Focus, What to Remember, and Concerns only when a material issue exists. The collapsed doc must read as a complete 30-second skim. When a change needs a visual, pick it from the template's component library: guided walkthrough for multi-step flows, before/after diagram toggle for structural shifts, comparison table for conventions or contracts, plain theme-aware SVG for a single flow, term tooltips for jargon. Default to no code — reference path:line; include a tight before/after code excerpt only when the exact code shape carries the decision. Write it to .change-explainer/<slug>.html in the working directory, make that directory self-ignoring via a .change-explainer/.gitignore containing '*', then open it (open/xdg-open, or npx -y lavish-axi when the user wants an annotate/feedback loop). Stay descriptive. Give a short in-chat orientation with the file path and keep the depth in the doc."
