interface:
  display_name: "Change Explainer"
  short_description: "Explain diffs for reviewers through design decisions, contracts, tradeoffs, and maintenance implications"
  default_prompt: "Use change-explainer when the user wants to understand a diff, unstaged changes, a commit, a PR patch, or two file versions as a reviewer- or maintainer-oriented walkthrough rather than a raw recap. If no comparison target is provided, default to the current repo's uncommitted changes: inspect git status, staged and unstaged diffs, and relevant untracked files before asking for clarification. Start with the big picture, teach the smallest useful post-change mental model, then explain the main behavior, contract, ownership, and design decisions in learning order. Use snippets rarely by default; include them only when the exact code is important or crucial to understanding the change. Prefer prose, before/after/why framing, and compact ASCII diagrams when flow or ownership changes are easier to see than describe. Focus on what changed, why, how the edits fit one idea, and only surface important concerns when they materially matter."
