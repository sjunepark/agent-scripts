interface:
  display_name: "Change Explainer"
  short_description: "Explain a diff, commit, PR, or file pair as a self-contained interactive HTML doc for reviewers"
  default_prompt: "Use change-explainer when the user wants to understand a diff, unstaged or staged changes, a commit, a commit range, a PR patch, or two file versions as a reviewer- or maintainer-oriented walkthrough, delivered as a self-contained interactive HTML doc rather than a raw recap. If no comparison target is provided, default to the current repo's uncommitted changes: inspect git status, staged and unstaged diffs, and relevant untracked files before asking for clarification. Group scattered hunks into a few conceptual changes named by their technical decision, ordered for learning. Build the doc from the bundled assets/template.html: keep its inline CSS/JS, fill the marked regions, and produce Big Picture, How the Change Works (collapsible conceptual changes with optional before/after toggles and a why-it-matters note), Key Decisions, Reviewer & Maintenance Focus, What to Remember, and Concerns only when a material issue exists. Write it to .change-explainer/<slug>.html in the working directory, make that directory self-ignoring via a .change-explainer/.gitignore containing '*', then open it (open/xdg-open, or npx -y lavish-axi when the user wants an annotate/feedback loop). Use before/after panels and small ASCII diagrams as evidence only when the exact code shape or the flow change carries the decision. Stay descriptive; surface concerns only when they materially matter. Give a short in-chat orientation with the file path and keep the depth in the doc."
