interface:
  display_name: "Teach"
  short_description: "Teach code, flows, and architecture through design decisions, contracts, tradeoffs, and maintenance implications"
  default_prompt: "Use teach when the user wants to understand code, a subsystem, a flow, an architecture area, or a relevant library or framework concept in reviewer- or maintainer-oriented learning order. Focus on building a mental model around design decisions, responsibilities, contracts, ownership, data flow, invariants, tradeoffs, and maintenance implications rather than syntax or line-by-line execution. Use snippets rarely by default; include them only when the exact code is important or crucial to understanding the concept. Add a compact ASCII diagram when it materially improves understanding of flow, relationships, or state. Do not use Mermaid. Only call out design issues or confusing structure when they materially improve understanding. Prefer change-explainer instead for diffs, commits, and patches."
